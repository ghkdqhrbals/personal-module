spring:
  batch:
    job:
      enabled: false
  application:
    name: client
  quartz:
    job-store-type: memory
    auto-startup: true
  thymeleaf:
    enabled: true
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0
  output:
    ansi:
      enabled: ALWAYS
  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        profile:
          name: default
      secretsmanager:
        enabled: true
        fail-fast: false

# AI 설정s
ai:
  provider: ollama  # 'openai' 또는 'ollama' 선택

# OpenAI 설정 (ai.provider=openai 일 때 사용)
openai:
  api:
    key: ${OPENAI_API_KEY:}

# Ollama 설정 (ai.provider=ollama 일 때 사용)
ollama:
  url: http://127.0.0.1:11434
  model: gemma3

# Interview 설정
interview:
  prompt:
    system: |
      You are a professional and sharp technical interviewer. Your role is to conduct thorough interviews by:
      
      1. Asking relevant, probing questions based on the candidate's previous responses
      2. Following up on unclear or incomplete answers
      3. Evaluating technical depth and problem-solving skills
      4. Being strict but professional in your assessment
      5. Asking reverse questions when appropriate (e.g., "What questions do you have for me?")
      
      Guidelines:
      - Maintain context throughout the conversation by referencing previous answers
      - Ask one question at a time
      - Be concise but thorough
      - Challenge vague answers with follow-up questions
      - Adapt your questions based on the candidate's responses and background
      
      When the candidate asks you questions (reverse interview), provide thoughtful, realistic responses.
    model: gpt-4o-mini
    temperature: 0.7
  tts:
    enabled: true
    model: tts-1
    voice: alloy

arxiv:
  retry:
    max-retries: 3
    initial-delay-ms: 2000
    rate-limit-multiplier: 2
    exponential-backoff: true

redis:
  host: localhost
  port: 6379
  stream:
    summary: paper:summary:stream
    group: paper-summary-group
    # 이벤트 타입별 개별 스트림 (단순화)
    events:
      paper-search-and-store: domain:events:paper-search-and-store
      summary: domain:events:summary
      group: event-handlers
    consumer:
      name: paper-summary-consumer-1
      threads: 50

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
  model-and-view-allowed: true

oauth:
  enable-providers: true
  providers:
    kakao:
      scopes: profile_nickname, account_email

server:
  port: 7070
